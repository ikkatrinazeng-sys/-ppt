<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>美团黄黑编辑风 · Deck</title>
<style>
  :root{ --y:#FFD100; --ink:#141414; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#111;color:#eee;font-family:-apple-system,"PingFang SC",sans-serif;height:100vh;overflow:hidden;}
  #stage{height:100vh;display:grid;place-items:center;}
  #frame{width:1280px;height:720px;border:0;background:#fff;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #bar{position:fixed;left:0;right:0;bottom:0;height:52px;display:flex;align-items:center;gap:16px;
       padding:0 20px;background:rgba(20,20,20,.9);backdrop-filter:blur(8px);font-size:13px;}
  #bar b{color:var(--y);font-weight:800;}
  .btn{background:none;border:1px solid #444;color:#eee;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;}
  .btn:hover{border-color:var(--y);color:var(--y);}
  #dots{display:flex;gap:6px;margin-left:auto;}
  .dot{width:9px;height:9px;border-radius:50%;background:#444;cursor:pointer;}
  .dot.on{background:var(--y);}
  kbd{background:#333;border-radius:4px;padding:1px 6px;font-size:11px;}
</style></head>
<body>
  <div id="stage"><iframe id="frame" src=""></iframe></div>
  <div id="bar">
    <button class="btn" onclick="go(-1)">← 上一页</button>
    <button class="btn" onclick="go(1)">下一页 →</button>
    <button class="btn" onclick="present()">⛶ 全屏放映</button>
    <span>第 <b id="cur">1</b> / <span id="tot">0</span> 页 &nbsp;·&nbsp; <kbd>←</kbd><kbd>→</kbd> 翻页 &nbsp; <kbd>F</kbd> 全屏</span>
    <div id="dots"></div>
  </div>
<script>
const slides = [
  "slides/01-cover.html","slides/02-contents.html","slides/03-section.html",
  "slides/04-data.html","slides/05-timeline.html","slides/06-section-tech.html",
  "slides/07-content.html","slides/08-storyboard.html","slides/09-image-text.html",
  "slides/10-team.html","slides/11-duo.html","slides/12-cover-b.html",
  "slides/13-charts-growth.html","slides/14-charts-structure.html","slides/15-data-yellow.html",
  "slides/16-quote.html","slides/17-closing.html"
];
let i = 0;
const frame=document.getElementById('frame'), cur=document.getElementById('cur'),
      tot=document.getElementById('tot'), dots=document.getElementById('dots'), stage=document.getElementById('stage');
tot.textContent = slides.length;
slides.forEach((_,n)=>{const d=document.createElement('div');d.className='dot';d.onclick=()=>show(n);dots.appendChild(d);});
function show(n){ i=(n+slides.length)%slides.length; frame.src=slides[i]; cur.textContent=i+1;
  [...dots.children].forEach((d,k)=>d.classList.toggle('on',k===i)); }
function go(d){ show(i+d); }
function present(){ (stage.requestFullscreen||stage.webkitRequestFullscreen).call(stage); }
function fit(){ const s=Math.min(innerWidth/1280,(innerHeight-52)/720); stage.style.transform=`scale(${s})`; stage.style.transformOrigin='center'; }
addEventListener('keydown',e=>{ if(e.key==='ArrowRight'||e.key===' ')go(1); if(e.key==='ArrowLeft')go(-1); if(e.key.toLowerCase()==='f')present(); });
addEventListener('resize',fit); document.addEventListener('fullscreenchange',fit);
show(0); fit();
</script>
</body></html>
