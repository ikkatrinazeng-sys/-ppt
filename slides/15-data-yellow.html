<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<!-- 满黄数据页：黄底 + 墨色英雄块 + 黑线数据网格 -->
<div class="slide canvas-y" style="padding:40px 64px;">
  <div class="furn-top" style="color:var(--brand-ink-2);">
    <span>增长数据 / KEY METRICS</span>
    <span>15 / 17</span>
  </div>

  <div style="position:absolute;left:64px;top:96px;display:flex;align-items:center;">
    <h2 class="headline" style="font-size:70px;">效率即护城河</h2>
    <span class="chev" style="margin-left:26px;"><span></span><span></span><span></span></span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:196px;">

  <!-- 墨色英雄块 -->
  <div style="position:absolute;left:64px;top:250px;width:400px;height:390px;background:var(--brand-ink);color:var(--brand-bg);display:flex;flex-direction:column;justify-content:center;padding:40px 36px;">
    <div class="kicker" style="color:var(--brand-primary);margin-bottom:22px;">全年</div>
    <div class="num" style="font-family:var(--font-display);font-weight:900;font-size:120px;line-height:.85;color:var(--brand-primary);">98.6<span style="font-size:52px;">%</span></div>
    <div style="margin-top:16px;font-size:17px;line-height:1.5;color:var(--brand-gray-2);font-weight:700;">全年准时送达率<br>On-time Delivery Rate</div>
  </div>

  <!-- 黑线数据网格 -->
  <div style="position:absolute;left:504px;right:64px;top:250px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;height:390px;">
    <div class="stat" style="border-top:3px solid var(--brand-ink);border-right:2px solid var(--brand-ink);padding:22px 28px;">
      <div class="num" style="font-size:78px;">6.9<span class="u">亿</span></div>
      <div class="lab">年交易用户</div>
    </div>
    <div class="stat" style="border-top:3px solid var(--brand-ink);padding:22px 28px;">
      <div class="num" style="font-size:78px;">745<span class="u">万</span></div>
      <div class="lab">年活跃骑手</div>
    </div>
    <div class="stat" style="border-top:2px solid var(--brand-ink);border-right:2px solid var(--brand-ink);padding:22px 28px;">
      <div class="num" style="font-size:78px;">1300<span class="u">城</span></div>
      <div class="lab">即时零售覆盖</div>
    </div>
    <div class="stat" style="border-top:2px solid var(--brand-ink);padding:22px 28px;">
      <div class="num" style="font-size:78px;">15<span class="u">min</span></div>
      <div class="lab">平均履约时长</div>
    </div>
  </div>

  <div class="furn-bot" style="color:var(--brand-ink-2);">
    <span>数据来源 · 年报（示意）</span>
    <span class="arrow-cta">下一节 →</span>
  </div>
</div>
</body></html>
