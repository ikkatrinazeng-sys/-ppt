<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<div class="slide" style="padding:40px 64px;">
  <div class="furn-top">
    <span class="mt-mark" style="letter-spacing:0"><i></i></span>
    <span>业务结构 / STRUCTURE</span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:78px;">

  <div style="position:absolute;left:64px;top:110px;display:flex;align-items:center;">
    <h2 class="headline hl-l">收入<span class="hl-mark">结构</span></h2>
    <span class="chev sm" style="margin-left:20px;"><span></span><span></span><span></span></span>
  </div>

  <!-- 左：环形图 + 图例 -->
  <div style="position:absolute;left:64px;top:270px;width:340px;">
    <svg id="donutsvg" viewBox="0 0 300 300" width="300"></svg>
    <div id="legend" style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-top:20px;font-size:15px;"></div>
  </div>

  <!-- 右：横向排名条 -->
  <div style="position:absolute;left:520px;right:64px;top:280px;">
    <div style="font-family:var(--font-display);font-weight:800;font-size:13px;letter-spacing:.14em;color:var(--brand-ink-2);margin-bottom:20px;" id="rank-unit"></div>
    <div id="ranklist" style="display:flex;flex-direction:column;gap:20px;"></div>
  </div>

  <div class="furn-bot"><span>数据来源 · 年报（示意）</span><span>14 / 17</span></div>
</div>

<script>
/* ====== 改这里的数字即可，环形角度 / 条宽自动计算 ====== */
const DONUT = {
  centerTop: 'GMV', centerBottom: '收入结构',
  /* color: primary | ink | c3 | c4（依次为主色/墨/深主色/灰）*/
  segments: [
    { label:'到店',     value:45, color:'primary' },
    { label:'外卖',     value:30, color:'ink' },
    { label:'即时零售', value:18, color:'c3' },
    { label:'其他',     value:7,  color:'c4' },
  ]
};
const RANK = {
  unit: '品类 GMV 排名 · 指数',
  items: [ ['餐饮外卖',100],['到店综合',72],['酒店旅行',58],['医药健康',34],['生鲜零售',26] ]
};
/* ================================================= */

const VAR = { primary:'--brand-primary', ink:'--brand-ink', c3:'--brand-chart-3', c4:'--brand-chart-4' };
const C = 2 * Math.PI * 90;

function donut(svg, cfg){
  const total = cfg.segments.reduce((s,x)=>s+x.value,0);
  let off=0, arcs='';
  cfg.segments.forEach(s=>{
    const len = s.value/total*C;
    arcs += `<circle cx="150" cy="150" r="90" class="s-${s.color}" stroke-dasharray="${len.toFixed(1)} ${(C-len).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}"/>`;
    off += len;
  });
  svg.innerHTML =
    `<g transform="rotate(-90 150 150)" fill="none" stroke-width="46">${arcs}</g>` +
    `<text x="150" y="142" font-family="Archivo,sans-serif" font-weight="900" font-size="40" class="f-ink" text-anchor="middle">${cfg.centerTop}</text>` +
    `<text x="150" y="170" font-family="'Noto Sans SC',sans-serif" font-weight="700" font-size="16" class="f-gray" text-anchor="middle">${cfg.centerBottom}</text>`;
  document.getElementById('legend').innerHTML = cfg.segments.map(s=>
    `<div style="display:flex;align-items:center;gap:8px;"><span style="width:14px;height:14px;background:var(${VAR[s.color]});flex:none;"></span>${s.label} <b style="margin-left:auto;font-family:var(--font-display);">${Math.round(s.value/total*100)}%</b></div>`
  ).join('');
}

function rankBars(el, cfg){
  const max = Math.max(...cfg.items.map(i=>i[1]));
  el.innerHTML = cfg.items.map((it,i)=>
    `<div><div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:6px;"><span>${it[0]}</span><span style="font-family:var(--font-display);">${it[1]}</span></div>`+
    `<div style="height:20px;background:var(--brand-line);"><div style="width:${(it[1]/max*100).toFixed(1)}%;height:100%;background:var(${i===0?'--brand-ink':'--brand-primary'});"></div></div></div>`
  ).join('');
}

document.getElementById('rank-unit').textContent = RANK.unit;
donut(document.getElementById('donutsvg'), DONUT);
rankBars(document.getElementById('ranklist'), RANK);
</script>
</body></html>
