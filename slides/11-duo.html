<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<!-- 双人物大图页：两张大幅黑白肖像 + 墨条名牌 + 引言 -->
<div class="slide" style="padding:40px 64px;">
  <div class="furn-top">
    <span class="mt-mark" style="letter-spacing:0"><i></i></span>
    <span>对话 / IN CONVERSATION</span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:78px;">

  <div style="position:absolute;left:64px;top:104px;display:flex;align-items:center;">
    <h2 class="headline hl-l">两位<span class="hl-mark">操盘手</span></h2>
    <span class="chev sm" style="margin-left:22px;"><span></span><span></span><span></span></span>
  </div>

  <!-- 左人物 -->
  <div style="position:absolute;left:64px;top:250px;width:352px;">
    <div class="photo" style="height:300px;">
      <div class="imgph"></div>
      <div style="position:absolute;left:0;bottom:0;right:0;background:var(--brand-ink);color:var(--brand-bg);padding:12px 16px;display:flex;justify-content:space-between;align-items:baseline;">
        <b style="font-family:var(--font-cjk);font-weight:900;font-size:20px;">王工</b>
        <span style="font-family:var(--font-display);font-weight:800;font-size:11px;letter-spacing:.12em;color:var(--brand-primary);">INFRA LEAD</span>
      </div>
    </div>
    <p style="margin-top:20px;font-size:16px;line-height:1.7;color:var(--brand-ink-2);">
      「我们不追风口，只把每一次履约的<b>确定性</b>做厚——这才是长期的复利。」
    </p>
  </div>

  <!-- 右人物 -->
  <div style="position:absolute;right:64px;top:250px;width:352px;">
    <div class="photo ink" style="height:300px;">
      <div class="imgph"></div>
      <div style="position:absolute;left:0;bottom:0;right:0;background:var(--brand-ink);color:var(--brand-bg);padding:12px 16px;display:flex;justify-content:space-between;align-items:baseline;">
        <b style="font-family:var(--font-cjk);font-weight:900;font-size:20px;">李工</b>
        <span style="font-family:var(--font-display);font-weight:800;font-size:11px;letter-spacing:.12em;color:var(--brand-primary);">AI PLATFORM</span>
      </div>
    </div>
    <p style="margin-top:20px;font-size:16px;line-height:1.7;color:var(--brand-ink-2);">
      「大模型不是炫技，是把 <b>90% 的高频咨询</b>从分钟级压到秒级的真实杠杆。」
    </p>
  </div>

  <!-- 中缝黄色分隔 + 星芒 -->
  <svg width="58" height="58" viewBox="0 0 100 100" style="position:absolute;left:611px;top:360px;">
    <path d="M50 0 C54 34 66 46 100 50 C66 54 54 66 50 100 C46 66 34 54 0 50 C34 46 46 34 50 0Z" class="f-primary s-ink" stroke-width="3"/>
  </svg>

  <div class="furn-bot"><span>对话录 · 技术负责人</span><span>11 / 17</span></div>
</div>
</body></html>
