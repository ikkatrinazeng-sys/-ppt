<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<div class="slide" style="padding:40px 64px;">

  <!-- 页眉 -->
  <div class="furn-top">
    <span class="mt-mark" style="letter-spacing:0"><i></i></span>
    <span>品牌战略汇报 / STRATEGY REVIEW</span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:78px;">

  <!-- 主标题区 -->
  <div style="position:absolute;left:64px;top:138px;">
    <div class="kicker" style="margin-bottom:22px;">
      科技零售 <span class="cn">· TECH RETAIL</span>
    </div>
    <h1 class="headline hl-xxl">
      帮大家<br>
      <span class="hl-mark" style="display:inline-block;height:170px;line-height:170px;">吃得更好</span><br>
      生活更好
    </h1>
  </div>

  <!-- 右侧手写点缀 + 星芒 -->
  <div style="position:absolute;right:80px;top:250px;text-align:right;">
    <svg class="spark" width="86" height="86" viewBox="0 0 100 100" style="margin-bottom:14px;">
      <path d="M50 0 C54 34 66 46 100 50 C66 54 54 66 50 100 C46 66 34 54 0 50 C34 46 46 34 50 0Z" class="f-ink"/>
    </svg>
    <div class="script" style="font-size:58px;">Eat Better,<br>Live Better</div>
  </div>

  <!-- 黄色角块装饰 -->
  <div style="position:absolute;right:0;bottom:0;width:220px;height:150px;background:var(--brand-primary);"></div>
  <svg width="46" height="46" viewBox="0 0 100 100" style="position:absolute;right:150px;bottom:210px;">
    <path d="M50 0 C54 34 66 46 100 50 C66 54 54 66 50 100 C46 66 34 54 0 50 C34 46 46 34 50 0Z" class="f-primary"/>
  </svg>

  <!-- 页脚 -->
  <div class="furn-bot">
    <span>杭州</span>
    <span class="arrow-cta">向下汇报 ↓</span>
    <span>01 / 17</span>
  </div>

</div>
</body></html>
