<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<div class="slide" style="padding:40px 64px;">

  <div class="furn-top">
    <span class="mt-mark" style="letter-spacing:0"><i></i></span>
    <span>增长数据 / KEY METRICS</span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:78px;">

  <!-- 标题 -->
  <div style="position:absolute;left:64px;top:112px;">
    <div class="kicker" style="margin-bottom:14px;">全年 / FULL YEAR</div>
    <h2 class="headline hl-l">规模与<span class="hl-mark">效率</span></h2>
  </div>

  <!-- 黄底英雄数据 -->
  <div class="stat-hero" style="position:absolute;left:64px;top:300px;width:400px;height:340px;">
    <div class="stat">
      <div class="num">6.9<span class="u">亿</span></div>
      <div class="lab" style="color:var(--brand-ink-2);font-weight:700;">年交易用户数<br>Annual Transacting Users</div>
    </div>
    <svg width="54" height="54" viewBox="0 0 100 100" style="margin-top:26px;">
      <path d="M50 0 C54 34 66 46 100 50 C66 54 54 66 50 100 C46 66 34 54 0 50 C34 46 46 34 50 0Z" class="f-ink"/>
    </svg>
  </div>

  <!-- 右侧数据阵列 -->
  <div style="position:absolute;left:504px;right:64px;top:300px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:0;height:340px;">
    <div class="stat" style="border-top:2px solid var(--brand-ink);border-right:1px solid var(--brand-line);padding:20px 26px;">
      <div class="num" style="font-size:74px;">745<span class="u">万</span></div>
      <div class="lab">年活跃骑手</div>
    </div>
    <div class="stat" style="border-top:2px solid var(--brand-ink);padding:20px 26px;">
      <div class="num" style="font-size:74px;">98.6<span class="u">%</span></div>
      <div class="lab">准时送达率</div>
    </div>
    <div class="stat" style="border-top:1px solid var(--brand-line);border-right:1px solid var(--brand-line);padding:20px 26px;">
      <div class="num" style="font-size:74px;">15<span class="u">min</span></div>
      <div class="lab">平均履约时长</div>
    </div>
    <div class="stat" style="border-top:1px solid var(--brand-line);padding:20px 26px;">
      <div class="num" style="font-size:74px;">1300<span class="u">城</span></div>
      <div class="lab">即时零售覆盖</div>
    </div>
  </div>

  <div class="furn-bot">
    <span>数据来源 · 年报（示意）</span>
    <span class="arrow-cta">下一节 · 战略版图 →</span>
    <span>04 / 17</span>
  </div>
</div>
</body></html>
