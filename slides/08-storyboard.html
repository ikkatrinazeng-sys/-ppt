<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<!-- 分镜/流程页：满黄画布 + 编号照片网格（THE STORY 式） -->
<div class="slide canvas-y" style="padding:40px 64px;">
  <div class="furn-top" style="color:var(--brand-ink-2);">
    <span>一单的旅程 / THE JOURNEY</span>
    <span>08 / 17</span>
  </div>

  <!-- 大标题 + 箭头 -->
  <div style="position:absolute;left:64px;top:96px;display:flex;align-items:center;">
    <h2 class="headline" style="font-size:78px;">订单的一天</h2>
    <span class="chev" style="margin-left:28px;"><span></span><span></span><span></span></span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:206px;">

  <div class="sb-grid" style="position:absolute;left:64px;right:64px;top:250px;">
    <div class="sb-cell">
      <div class="no">(01) — 下单</div>
      <h4>指尖上的<br>三餐决定</h4>
      <p>用户在 App 下单，需求侧数据实时进入调度系统。</p>
      <div class="shot"><img src="https://picsum.photos/id/292/600/450" alt=""></div>
    </div>
    <div class="sb-cell">
      <div class="no">(02) — 履约</div>
      <h4>超脑毫秒级<br>智能派单</h4>
      <p>系统为最优骑手匹配路径，商家同步备餐出餐。</p>
      <div class="shot"><img src="https://picsum.photos/id/1071/600/450" alt=""></div>
    </div>
    <div class="sb-cell">
      <div class="no">(03) — 送达</div>
      <h4>30 分钟<br>准时抵达</h4>
      <p>骑手完成末端配送，一次确定性履约闭环。</p>
      <div class="shot"><img src="https://picsum.photos/id/1062/600/450" alt=""></div>
    </div>
  </div>

  <div class="furn-bot" style="color:var(--brand-ink-2);">
    <span>MEITUAN · 即时履约</span>
    <span class="arrow-cta">下一节 · 技术底座 →</span>
  </div>
</div>
</body></html>
