<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<!-- 封面 B：满黄画布 + 巨型描边字母背景母题（Future London 式） -->
<div class="slide canvas-y" style="padding:40px 64px;">

  <!-- 线形「美」母题：细描边、完整可辨、置于右侧呼吸区 -->
  <div class="outline cjk" style="position:absolute;right:70px;top:96px;font-size:600px;-webkit-text-stroke:2px var(--brand-ink);">美</div>

  <div class="furn-top" style="color:var(--brand-ink-2);">
    <span class="mt-mark" style="letter-spacing:0"><i style="background:var(--brand-ink);color:var(--brand-primary)"></i></span>
    <span>品牌战略 / STRATEGY</span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:78px;">

  <div style="position:absolute;left:64px;top:250px;">
    <div class="kicker" style="margin-bottom:26px;color:var(--brand-ink);">
      科技零售 <span class="cn">· TECH RETAIL</span>
    </div>
    <div style="display:flex;align-items:center;">
      <h1 class="headline hl-xl">科技零售<br>新叙事</h1>
      <span class="chev" style="margin-left:30px;"><span></span><span></span><span></span></span>
    </div>
    <p style="margin-top:30px;font-size:19px;line-height:1.7;max-width:560px;color:var(--brand-ink-2);">
      以「零售 + 科技」重塑生活服务的确定性——帮大家吃得更好，生活更好。
    </p>
  </div>

  <div class="furn-bot" style="color:var(--brand-ink-2);">
    <span>杭州</span>
    <span>12 / 17</span>
  </div>
</div>
</body></html>
