<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<!-- 章节页：黄底撞色（浅色为主体系里的“亮撞色”节奏点） -->
<div class="slide" style="background:var(--brand-primary);padding:40px 64px;">

  <div class="furn-top" style="color:var(--brand-ink-2);">
    <span class="mt-mark" style="letter-spacing:0"><i style="background:var(--brand-ink);color:var(--brand-primary)"></i></span>
    <span>章节 / SECTION</span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:78px;">

  <!-- 巨型编号 -->
  <div class="bignum" style="position:absolute;left:52px;top:150px;">01</div>

  <!-- 章节标题 -->
  <div style="position:absolute;left:560px;top:300px;">
    <div class="kicker" style="margin-bottom:20px;">
      OVERVIEW <span class="cn">· 业务概览</span>
    </div>
    <h2 class="headline hl-xl" style="letter-spacing:.05em;">
      我们是一家<br><span class="ink-block" style="display:inline-block;height:130px;line-height:130px;vertical-align:middle;">科技零售</span><span style="vertical-align:middle;">公司</span>
    </h2>
    <p style="margin-top:28px;font-size:18px;line-height:1.7;max-width:520px;color:var(--brand-ink-2);">
      以「零售 + 科技」的战略，践行「帮大家吃得更好，生活更好」的公司使命。
    </p>
  </div>

  <!-- 星芒 -->
  <svg width="70" height="70" viewBox="0 0 100 100" style="position:absolute;right:90px;top:170px;">
    <path d="M50 0 C54 34 66 46 100 50 C66 54 54 66 50 100 C46 66 34 54 0 50 C34 46 46 34 50 0Z" class="f-ink"/>
  </svg>

  <div class="furn-bot" style="color:var(--brand-ink-2);">
    <span>本节涵盖 · 使命 / 战略 / 版图</span>
    <span>03 / 17</span>
  </div>
</div>
</body></html>
