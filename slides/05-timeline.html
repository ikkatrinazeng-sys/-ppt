<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<div class="slide" style="padding:40px 64px;">
  <div class="furn-top">
    <span class="mt-mark" style="letter-spacing:0"><i></i></span>
    <span>发展历程 / MILESTONES</span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:78px;">

  <div style="position:absolute;left:64px;top:112px;">
    <div class="kicker" style="margin-bottom:14px;">一路生长 · SINCE 2010</div>
    <h2 class="headline hl-l">十四年<span class="hl-mark">关键节点</span></h2>
  </div>

  <div class="tl" style="position:absolute;left:64px;right:64px;top:360px;">
    <div class="tl-node">
      <div class="dot"></div>
      <div class="yr">2010</div>
      <h4>团购起步</h4>
      <p>以本地生活团购切入，跑通「千团大战」。</p>
    </div>
    <div class="tl-node">
      <div class="dot"></div>
      <div class="yr">2015</div>
      <h4>外卖崛起</h4>
      <p>即时配送网络成型，重塑到家履约。</p>
    </div>
    <div class="tl-node">
      <div class="dot"></div>
      <div class="yr">2018</div>
      <h4>港交所上市</h4>
      <p>9 月 20 日挂牌，进入平台化阶段。</p>
    </div>
    <div class="tl-node">
      <div class="dot" style="background:var(--brand-ink);"></div>
      <div class="yr">2024</div>
      <h4>科技零售</h4>
      <p>无人机 + 大模型，走向智能履约。</p>
    </div>
  </div>

  <div class="furn-bot"><span>自 2010 年 3 月成立</span><span>05 / 17</span></div>
</div>
</body></html>
