<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="deck.css">
</head>
<body>
<div class="slide" style="padding:40px 64px;">

  <div class="furn-top">
    <span class="mt-mark" style="letter-spacing:0"><i></i></span>
    <span>我们的科技 / OUR TECHNOLOGY</span>
  </div>
  <hr class="rule" style="position:absolute;left:64px;right:64px;top:78px;">

  <!-- 标题 -->
  <div style="position:absolute;left:64px;top:110px;">
    <h2 class="headline hl-l">
      三条<span class="hl-mark">技术主线</span>
    </h2>
    <p style="margin-top:16px;font-size:17px;color:var(--brand-ink-2);max-width:560px;line-height:1.6;">
      从需求侧到供给侧的数字化升级，支撑每天数亿次即时履约。
    </p>
  </div>

  <span class="script" style="position:absolute;right:70px;top:120px;font-size:46px;transform:rotate(-6deg);">powered by AI</span>

  <!-- 三卡 -->
  <div style="position:absolute;left:64px;right:64px;top:330px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;">

    <div class="ed-card">
      <div class="idx">01 — 履约</div>
      <h3>无人机<br>即时配送</h3>
      <p>低空物流网络实现 3 公里 15 分钟送达，重塑城市末端履约效率。</p>
      <span class="arrow">↗</span>
    </div>

    <div class="ed-card" style="background:var(--brand-ink);color:var(--brand-bg);border-color:var(--brand-ink);">
      <div class="idx" style="color:var(--brand-primary);">02 — 调度</div>
      <h3>超脑<br>智能调度</h3>
      <p style="color:var(--brand-gray-2);">毫秒级为百万骑手匹配最优路径，高峰期订单分配效率提升 40%。</p>
      <span class="arrow" style="color:var(--brand-primary);">↗</span>
    </div>

    <div class="ed-card">
      <div class="idx">03 — 服务</div>
      <h3>大模型<br>智能客服</h3>
      <p>自研生活服务大模型，覆盖 90% 高频咨询，响应从分钟级降至秒级。</p>
      <span class="arrow">↗</span>
    </div>

  </div>

  <div class="furn-bot">
    <span>研发投入持续加大</span>
    <span>07 / 17</span>
  </div>
</div>
</body></html>
